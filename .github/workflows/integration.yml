name: Integration (lab CallManager)

# Self-hosted runner on the lab network; cloud runners cannot reach private CM IPs.
on:
  workflow_dispatch:
    inputs:
      integration_labs:
        description: Comma-separated labs (cm2, cm43)
        required: false
        default: "cm2,cm43"
      cm2_server:
        description: CM2 server IP
        required: false
        default: "10.0.0.11"
      cm43_server:
        description: CM4.3 / CUCM server IP
        required: false
        default: "10.0.0.180"
      cm43_mac_a:
        description: CM4.3 device A MAC (no separators)
        required: false
        default: "222233334444"

jobs:
  integration:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 portaudio19-dev \
            libasound2-dev \
            freetds-dev unixodbc-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run live integration tests
        env:
          PYSKINNY_INTEGRATION_LABS: ${{ inputs.integration_labs }}
          PYSKINNY_CM2_SERVER: ${{ inputs.cm2_server }}
          PYSKINNY_CM43_SERVER: ${{ inputs.cm43_server }}
          PYSKINNY_CM43_MAC_A: ${{ inputs.cm43_mac_a }}
          PYSKINNY_SKIP_TFTP: "1"
        run: pytest tests/test_integration_live.py -m integration -v --no-audio
