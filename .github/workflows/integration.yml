name: Integration (lab CUCM)

# Self-hosted runner on the lab network; cloud runners cannot reach private CUCM IPs.
on:
  workflow_dispatch:
    inputs:
      cucm_server:
        description: CUCM IP or hostname
        required: true
        default: "10.0.0.180"
      test_mac:
        description: SCCP device MAC (no separators)
        required: false
        default: "222233334444"

jobs:
  integration:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libportaudio2 portaudio19-dev \
            libasound2-dev \
            freetds-dev unixodbc-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        env:
          PYSKINNY_CUCM_SERVER: ${{ inputs.cucm_server }}
          PYSKINNY_TEST_MAC: ${{ inputs.test_mac }}
          PYSKINNY_SKIP_TFTP: "1"
        run: pytest -m integration -v --no-audio
